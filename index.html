<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="まなかち課題チェッカー">
  <meta name="theme-color" content="#f8f0ff">
  <title>まなかち課題チェッカー</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      min-height: 100dvh;
      font-family: 'Zen Maru Gothic', sans-serif;
      background: linear-gradient(160deg, #fce4ff 0%, #e8d5ff 40%, #d5caff 100%);
      color: #3a2550;
    }

    header {
      padding: calc(env(safe-area-inset-top, 0px) + 28px) 24px 20px;
      text-align: center;
    }

    h1 {
      font-size: 20px;
      font-weight: 900;
      background: linear-gradient(135deg, #c026d3, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.5px;
    }

    .sub {
      font-size: 11px;
      color: #a78bbb;
      margin-top: 4px;
    }

    main {
      padding: 0 20px calc(env(safe-area-inset-bottom, 0px) + 40px);
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Add Button ── */
    .add-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #d946ef, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 18px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(139,92,246,0.35);
      transition: transform 0.12s, box-shadow 0.12s;
      margin-bottom: 16px;
    }
    .add-btn:active { transform: scale(0.97); box-shadow: none; }
    .add-btn.open {
      background: rgba(255,255,255,0.6);
      color: #a78bbb;
      box-shadow: none;
    }

    /* ── Form ── */
    .form-panel {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
      animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }

    .form-panel input {
      width: 100%;
      background: rgba(255,255,255,0.8);
      border: 1.5px solid #e0c8ff;
      border-radius: 12px;
      color: #3a2550;
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      margin-bottom: 10px;
    }
    .form-panel input:focus { border-color: #a855f7; }
    .form-panel input::placeholder { color: #c4a8d8; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #d946ef, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .submit-btn:disabled { opacity: 0.3; }

    .form-hint { font-size: 11px; color: #b89ecc; text-align: center; margin-top: 8px; }

    /* ── Toast ── */
    .toast {
      background: rgba(255,255,255,0.75);
      color: #7c3aed;
      font-weight: 700;
      font-size: 13px;
      padding: 12px;
      border-radius: 14px;
      text-align: center;
      margin-bottom: 14px;
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }

    /* ── Notif Banner ── */
    .notif-banner {
      background: rgba(255,255,255,0.65);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .notif-banner p { font-size: 12px; color: #5a3a70; line-height: 1.5; }
    .notif-banner strong { color: #9333ea; display: block; }
    .notif-btn {
      white-space: nowrap;
      padding: 8px 14px;
      background: linear-gradient(135deg, #d946ef, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .filter-btn {
      flex: 1;
      padding: 8px;
      background: rgba(255,255,255,0.5);
      color: #b89ecc;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: linear-gradient(135deg, #d946ef, #8b5cf6);
      color: #fff;
    }

    /* ── Task Card ── */
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      padding: 14px 14px;
      margin-bottom: 10px;
      animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
      transition: opacity 0.2s;
    }
    .task-item.done { opacity: 0.4; }

    .check-btn {
      width: 26px; height: 26px; min-width: 26px;
      background: rgba(255,255,255,0.8);
      border: 2px solid #d8b4fe;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      transition: all 0.15s;
    }
    .task-item.done .check-btn {
      background: linear-gradient(135deg, #d946ef, #8b5cf6);
      border-color: transparent;
      color: #fff;
    }

    .task-body { flex: 1; min-width: 0; }

    .task-text {
      font-size: 15px;
      font-weight: 700;
      color: #3a2550;
      word-break: break-all;
      line-height: 1.4;
    }
    .task-item.done .task-text { text-decoration: line-through; color: #b89ecc; }

    .task-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; }

    .days-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 8px;
    }

    .due-date { font-size: 10px; color: #c4a8d8; }

    .del-btn {
      background: transparent; border: none;
      color: #d8b4fe; font-size: 20px;
      cursor: pointer; padding: 0 4px;
      transition: color 0.15s;
    }
    .del-btn:active { color: #d946ef; }

    /* ── Empty ── */
    .empty {
      text-align: center;
      padding: 60px 0;
      color: #c4a8d8;
      font-size: 14px;
      line-height: 2;
    }
    .empty-emoji { font-size: 44px; display: block; margin-bottom: 8px; }

    /* ── Urgent badge ── */
    .urgent-badge {
      display: inline-block;
      background: linear-gradient(135deg, #f0abfc, #c084fc);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-left: 8px;
      animation: blink 1.8s ease-in-out infinite;
      vertical-align: middle;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.94) translateY(6px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: 0.55; }
    }
  </style>
</head>
<body>

<header>
  <h1>まなかち課題チェッカー<span id="urgentBadge" class="urgent-badge" style="display:none"></span></h1>
  <div class="sub" id="headerSub">今日もがんばろう！</div>
</header>

<main>
  <div class="notif-banner" id="notifBanner" style="display:none">
    <p><strong>🔔 通知を許可する</strong>期限前日にお知らせします</p>
    <button class="notif-btn" onclick="requestNotif()">許可する</button>
  </div>

  <button class="add-btn" id="addBtn" onclick="toggleForm()">＋ 課題を記録する</button>

  <div class="form-panel" id="formPanel" style="display:none">
    <input type="text" id="taskInput" placeholder="課題の内容を入力…" maxlength="100"
      oninput="updateSubmit()" onkeydown="if(event.key==='Enter')submitTask()">
    <button class="submit-btn" id="submitBtn" onclick="submitTask()" disabled>記録する</button>
    <p class="form-hint" id="dueHint"></p>
  </div>

  <div class="toast" id="toast" style="display:none">✨ 記録できたよ！</div>

  <div class="filters" id="filters" style="display:none">
    <button class="filter-btn active" onclick="setFilter('all',this)">全て</button>
    <button class="filter-btn" onclick="setFilter('active',this)">未完了</button>
    <button class="filter-btn" onclick="setFilter('done',this)">完了</button>
  </div>

  <div id="taskList"></div>
  <div class="empty" id="emptyMsg">
    <span class="empty-emoji">🌸</span>
    課題なし！えらい！
  </div>
</main>

<script>
  const KEY = 'kadai_tasks_v1';
  let tasks = [], filter = 'all', formOpen = false, toastTimer = null, deferredPrompt = null;

  function init() {
    try { tasks = JSON.parse(localStorage.getItem(KEY)) || []; } catch { tasks = []; }
    updateDueHint(); render(); checkNotifPermission();
    setTimeout(checkUrgentAndNotify, 2000);
    setInterval(checkUrgentAndNotify, 3600000);
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  }

  function save() { localStorage.setItem(KEY, JSON.stringify(tasks)); }

  function getNextWeek() {
    const d = new Date(); d.setDate(d.getDate()+7);
    return d.toISOString().split('T')[0];
  }

  function updateDueHint() {
    document.getElementById('dueHint').textContent = `📅 期限: 来週 ${getNextWeek()} に自動設定`;
  }

  function getDaysLeft(due) {
    const now = new Date(); now.setHours(0,0,0,0);
    return Math.ceil((new Date(due) - now) / 864e5);
  }

  function toggleForm() {
    formOpen = !formOpen;
    document.getElementById('addBtn').textContent = formOpen ? '✕ とじる' : '＋ 課題を記録する';
    document.getElementById('addBtn').className = 'add-btn' + (formOpen ? ' open' : '');
    document.getElementById('formPanel').style.display = formOpen ? 'block' : 'none';
    if (formOpen) { document.getElementById('taskInput').focus(); updateDueHint(); }
  }

  function updateSubmit() {
    document.getElementById('submitBtn').disabled = !document.getElementById('taskInput').value.trim();
  }

  function submitTask() {
    const text = document.getElementById('taskInput').value.trim();
    if (!text) return;
    tasks.unshift({ id: Date.now(), text, createdAt: new Date().toISOString(), dueDate: getNextWeek(), done: false });
    save(); document.getElementById('taskInput').value = '';
    toggleForm(); showToast(); render();
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.style.display = 'none', 2000);
  }

  function toggleDone(id) {
    tasks = tasks.map(t => t.id===id ? {...t, done:!t.done} : t);
    save(); render();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id!==id);
    save(); render();
  }

  function setFilter(f, el) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active'); render();
  }

  function render() {
    const active = tasks.filter(t => !t.done);
    const urgent = active.filter(t => getDaysLeft(t.dueDate) <= 1);
    const badge = document.getElementById('urgentBadge');
    badge.style.display = urgent.length > 0 ? 'inline-block' : 'none';
    if (urgent.length > 0) badge.textContent = `🔥 ${urgent.length}件急ぎ`;

    document.getElementById('headerSub').textContent =
      tasks.length === 0 ? '今日もがんばろう！' : `全${tasks.length}件 · 未完了${active.length}件`;

    document.getElementById('filters').style.display = tasks.length > 0 ? 'flex' : 'none';

    const shown = tasks.filter(t =>
      filter==='active' ? !t.done : filter==='done' ? t.done : true
    );
    document.getElementById('emptyMsg').style.display = shown.length === 0 ? 'block' : 'none';

    document.getElementById('taskList').innerHTML = shown.map(t => {
      const days = getDaysLeft(t.dueDate);
      const color = t.done ? '#c4a8d8' : days<0||days<=1 ? '#e879f9' : days<=3 ? '#f59e0b' : '#34d399';
      const label = t.done ? '✅ 完了' : days<0 ? '⚠️ 期限切れ' : days===0 ? '🔥 今日まで！' : days===1 ? '😱 明日まで！' : `⏰ 残り${days}日`;
      return `<div class="task-item ${t.done?'done':''}">
        <button class="check-btn" onclick="toggleDone(${t.id})">${t.done?'✓':''}</button>
        <div class="task-body">
          <div class="task-text">${esc(t.text)}</div>
          <div class="task-meta">
            <span class="days-badge" style="color:${color};background:${color}22">${label}</span>
            <span class="due-date">${t.dueDate}</span>
          </div>
        </div>
        <button class="del-btn" onclick="deleteTask(${t.id})">×</button>
      </div>`;
    }).join('');
  }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function checkNotifPermission() {
    if ('Notification' in window && Notification.permission==='default')
      document.getElementById('notifBanner').style.display='flex';
  }

  async function requestNotif() {
    const p = await Notification.requestPermission();
    document.getElementById('notifBanner').style.display='none';
    if (p==='granted') new Notification('🌸 通知ON！',{body:'期限前日にお知らせするよ！',tag:'setup'});
  }

  function checkUrgentAndNotify() {
    if (Notification.permission!=='granted') return;
    const u = tasks.filter(t => !t.done && getDaysLeft(t.dueDate)===1);
    if (u.length>0) new Notification(`📚 明日が期限の課題が${u.length}件あるよ！`,
      {body:u.map(t=>`・${t.text}`).join('\n'),tag:'reminder',renotify:true});
  }

  init();
</script>
</body>
</html>
